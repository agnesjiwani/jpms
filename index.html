<!DOCTYPE html>
<html lang="en-MY">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="JIWANI Pattern Management System">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="JPMS">

  <title>JPMS — JIWANI Pattern Management</title>

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/main.css">

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<!-- ═══════════════════════════════════════════
     LOGIN SCREEN
═══════════════════════════════════════════ -->
<div id="login-screen" class="login-page">
  <div class="login-card">
    <div class="login-logo">JPMS</div>
    <div class="login-subtitle">JIWANI Pattern Management System<br>by MEDIFORM VENTURES</div>

    <div id="google-signin-btn" style="display:flex;justify-content:center;margin-bottom:16px"></div>

    <button class="google-btn" onclick="document.getElementById('google-signin-btn').click()">
      <svg width="20" height="20" viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Sign in with Google
    </button>

    <p id="login-error" style="color:var(--red);font-size:14px;margin-top:12px"></p>

    <p style="font-size:12px;color:var(--text-tertiary);margin-top:24px">
      Access restricted to authorised JIWANI and MEDIFORM staff.
    </p>
  </div>
</div>


<!-- ═══════════════════════════════════════════
     APP SHELL
═══════════════════════════════════════════ -->
<div id="app-shell" class="app-layout hidden">

  <!-- Sidebar overlay (mobile) -->
  <div id="sidebar-overlay" class="sidebar-overlay"></div>

  <!-- ── SIDEBAR ── -->
  <nav id="app-sidebar" class="sidebar">
    <div class="sidebar-logo">
      <h1>JPMS</h1>
      <p>JIWANI · MEDIFORM</p>
    </div>
    <div id="sidebar-nav">
      <!-- Populated by JS -->
    </div>
    <div style="margin-top:auto;padding:16px;border-top:1px solid var(--border-light)">
      <button class="nav-item" onclick="Auth.logout()" style="color:var(--red)">
        <span class="nav-icon">🚪</span>
        <span>Sign Out</span>
      </button>
    </div>
  </nav>

  <!-- ── MAIN CONTENT ── -->
  <div class="main-content">

    <!-- Top bar -->
    <header class="topbar">
      <div class="topbar-left">
        <button id="hamburger-btn" class="hamburger" aria-label="Menu">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <span id="topbar-title" class="topbar-title">Dashboard</span>
      </div>

      <div class="topbar-right">
        <div class="search-bar desktop-only">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="text" id="global-search-inline" placeholder="Search..." autocomplete="off">
        </div>

        <div class="user-badge" id="user-badge">
          <div class="user-avatar">?</div>
        </div>
      </div>
    </header>

    <!-- Page content -->
    <main id="page-content">
      <!-- Pages render here -->
    </main>

  </div>
</div>

<!-- Toast container -->
<div id="toast-container" class="toast-container"></div>

<!-- ── SCRIPTS ── -->
<script src="js/auth.js"></script>
<script src="js/utils/helpers.js"></script>
<script src="js/sheets/api.js"></script>
<script src="js/modules/pages.js"></script>
<script src="js/app.js"></script>

<!-- Service Worker registration -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    });
  }
</script>

</body>
</html>
